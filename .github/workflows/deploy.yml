name: Deploy to Namecheap

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}

            # 1. Configure Git to use HTTPS with Personal Access Token
            echo "🔑 Configuring Git authentication..."
            git remote set-url origin https://${{ secrets.GH_USERNAME }}:${{ secrets.GH_TOKEN }}@github.com/Wediah/qualiden.git

            # 2. Reset any local changes that might conflict
            echo "🔄 Resetting local changes..."
            git checkout -- composer.json composer.lock 2>/dev/null || true
            git clean -fd

            # 3. Pull latest changes
            echo "📥 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            # 4. Install dependencies
            composer install --no-dev --ignore-platform-req=php --optimize-autoloader

            # 5. Sync Assets to public_html
            echo "🔄 Syncing assets to public_html..."

            # Ensure the directory exists
            mkdir -p ~/public_html/assets

            # Copy files from project 'assets' folder to public_html/assets
            # Using rsync is better, but cp works if rsync isn't installed
            cp -r assets/* ~/public_html/assets/ 2>/dev/null || true

            # FIX FOR PERMISSION ERROR:
            # Instead of chmod, we change ownership to the current user (whoever is running the script)
            # If you are logging in as 'root', this changes owner to root.
            # If you are logging in as 'cpaneluser', this changes owner to cpaneluser.
            chown -R $(whoami):$(whoami) ~/public_html/assets/

            # Now set permissions safely
            find ~/public_html/assets/ -type f -exec chmod 644 {} \;
            find ~/public_html/assets/ -type d -exec chmod 755 {} \;

            # 6. Laravel Maintenance & Migrations
            php artisan optimize:clear
            php artisan migrate --force

            echo "✅ Deployment complete!"
